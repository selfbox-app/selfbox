# Build, sign (macOS), and publish a draft GitHub Release for the
# Selfbox Desktop Sync app. Triggered by pushing a tag matching
# `desktop-v*.*.*` so the desktop release cycle stays independent from
# the web app's deploys.
#
# Outputs per release:
#   - Selfbox-{ver}-aarch64.dmg              (Apple Silicon)
#   - Selfbox-{ver}-x64.dmg                  (Intel Mac)
#   - Selfbox-{ver}-x64-setup.exe            (Windows NSIS, unsigned)
#   - Selfbox-{ver}-x64.msi                  (Windows MSI, unsigned)
#   - latest.json                            (updater manifest, signed by Tauri)
#   - .sig file alongside each bundle        (updater signature)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERTIFICATE              base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     password for the .p12
#   APPLE_SIGNING_IDENTITY         "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                       Apple ID email
#   APPLE_PASSWORD                 app-specific password
#   APPLE_TEAM_ID                  10-char team id
#   TAURI_UPDATER_SIGNING_KEY      output of `tauri signer generate`
#   TAURI_UPDATER_SIGNING_PASSWORD password set when generating the key
#
# Tag/ref values flow into action `with:` inputs rather than shell
# `run:` strings, so they aren't interpolated into a shell. The trigger
# also restricts ref names to `desktop-v*.*.*`.

name: Release desktop

on:
  push:
    tags:
      - "desktop-v*.*.*"

jobs:
  release:
    permissions:
      # Needed to create the GitHub Release and upload assets.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, notarize, and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. The action skips signing if these
          # aren't set, which is fine for the Windows job.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing — applied on every platform so each bundle
          # gets its `.sig` and the action emits a `latest.json` we can
          # mirror into the Selfbox download endpoint.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_SIGNING_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_SIGNING_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Selfbox Desktop ${{ github.ref_name }}"
          releaseBody: |
            See [`apps/desktop/CHANGELOG.md`](apps/desktop/CHANGELOG.md) for the full list of changes.

            **Downloads**
            - macOS (Apple Silicon): `*aarch64*.dmg`
            - macOS (Intel): `*x64*.dmg`
            - Windows: `*x64-setup.exe` or `*x64.msi`

            **Note for Windows users:** these builds aren't code-signed yet, so SmartScreen will warn on first launch. Click "More info → Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
